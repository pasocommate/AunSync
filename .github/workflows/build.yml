name: build

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      # 実値はリポジトリ直下 OBS_STUDIO_REF ファイルから次ステップで上書きする。
      # ここでの宣言は env コンテキストの静的解析を満たすためのプレースホルダ。
      OBS_STUDIO_REF: ""
      # OBS 32.0.x の libobs-winrt は <experimental/coroutine> を使うが、VS 2026 の
      # MSVC はこれをハードエラー化したため、非推奨エラーを抑制してビルドを通す。
      # CL 環境変数は cl.exe が読み取り、全コンパイルに /D を付与する。
      CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
    steps:
      - uses: actions/checkout@v7

      - name: Resolve target OBS ref (single source of truth)
        shell: pwsh
        run: |
          # サポート下限の OBS バージョンはリポジトリ直下 OBS_STUDIO_REF で一元管理する。
          # FFmpeg 依存は排除済みのため、ここは「libobs API 下限」を決めるだけの意味になる。
          $ref = (Get-Content "$env:GITHUB_WORKSPACE/OBS_STUDIO_REF" -Raw).Trim()
          if (-not $ref) { throw "OBS_STUDIO_REF file is empty" }
          Add-Content $env:GITHUB_ENV "OBS_STUDIO_REF=$ref"
          Write-Host "Target OBS ref (from OBS_STUDIO_REF file): $ref"

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install markdown PDF tools
        shell: pwsh
        run: |
          npm install --no-save md-to-pdf github-markdown-css

      - name: Convert README to PDF
        shell: pwsh
        run: |
          $sources = @(
            [pscustomobject]@{ src = "README.md";    dst = "README.pdf"    },
            [pscustomobject]@{ src = "README-en.md"; dst = "README-en.pdf" }
          )
          $tmpDir = "$env:GITHUB_WORKSPACE/.pdf-tmp"
          $dist   = "$env:GITHUB_WORKSPACE/dist"
          $css    = "$env:GITHUB_WORKSPACE/node_modules/github-markdown-css/github-markdown-light.css"
          $cjkCss = "$env:GITHUB_WORKSPACE/.github/pdf-cjk.css"
          if (-Not (Test-Path $css)) { throw "github-markdown CSS not found: $css" }
          New-Item -ItemType Directory -Force $dist   | Out-Null
          New-Item -ItemType Directory -Force $tmpDir | Out-Null

          $repoUrl  = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY"
          $refName  = $env:GITHUB_REF_NAME
          $blobBase = "$repoUrl/blob/$refName"
          $treeBase = "$repoUrl/tree/$refName"
          $rawBase  = "https://raw.githubusercontent.com/$env:GITHUB_REPOSITORY/$refName"
          $workspace = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE)

          function Resolve-GitHubUrl {
            param(
              [string]$url,
              [bool]$forImage
            )

            if ([string]::IsNullOrWhiteSpace($url)) { return $url }
            if ($url -match '^(?:[a-zA-Z][a-zA-Z0-9+.-]*:|#|//)') { return $url }

            $pathPart = $url
            $suffix = ""
            if ($url -match '^(?<path>[^?#]*)(?<suffix>[?#].*)$') {
              $pathPart = $Matches['path']
              $suffix = $Matches['suffix']
            }
            if ([string]::IsNullOrWhiteSpace($pathPart)) { return $url }

            if ($pathPart.StartsWith('/')) {
              $localPath = [System.IO.Path]::GetFullPath((Join-Path $workspace $pathPart.TrimStart('/')))
            } else {
              $localPath = [System.IO.Path]::GetFullPath((Join-Path $srcDir $pathPart))
            }

            if (-Not $localPath.StartsWith($workspace, [System.StringComparison]::OrdinalIgnoreCase)) {
              return $url
            }

            $repoPath = $localPath.Substring($workspace.Length).TrimStart('\', '/').Replace('\', '/')
            if ([string]::IsNullOrWhiteSpace($repoPath)) { return $url }

            if ($forImage) {
              if (Test-Path $localPath -PathType Leaf) {
                $ext = [System.IO.Path]::GetExtension($localPath).ToLowerInvariant()
                if ($ext -eq '.svg') {
                  $bytes = [System.IO.File]::ReadAllBytes($localPath)
                  $base64 = [System.Convert]::ToBase64String($bytes)
                  return "data:image/svg+xml;base64,$base64"
                }
              }
              return "$rawBase/$repoPath$suffix"
            }

            if (Test-Path $localPath -PathType Container) {
              return "$treeBase/$repoPath$suffix"
            }
            return "$blobBase/$repoPath$suffix"
          }

          foreach ($item in $sources) {
            $src    = "$env:GITHUB_WORKSPACE/$($item.src)"
            $srcDir = [System.IO.Path]::GetDirectoryName([System.IO.Path]::GetFullPath($src))
            $tmpSrc = "$tmpDir/$($item.src)"
            $tmpPdf = [System.IO.Path]::ChangeExtension($tmpSrc, ".pdf")
            $dst    = "$dist/$($item.dst)"

            if (-Not (Test-Path $src)) { throw "$($item.src) not found." }

            $content = Get-Content $src -Raw
            $content = [regex]::Replace($content, '\s*\|\s*\[[^\]]+\]\(README[^)]*\.md\)', '')
            $content = [regex]::Replace($content, '(?m)^\s*!\[[^\]]*\]\(https?://img\.shields\.io/[^)]+\)\s*\r?\n?', '')
            $content = [regex]::Replace($content, '(?m)^\s*<img[^>]*\bsrc=(["''])https?://img\.shields\.io/[^"''>]+\1[^>]*>\s*\r?\n?', '')
            $content = [regex]::Replace($content, '!\[(?<label>[^\]]*)\]\((?<url>[^)]+)\)', {
              param($m)
              $newUrl = Resolve-GitHubUrl $m.Groups['url'].Value $true
              return "![{0}]({1})" -f $m.Groups['label'].Value, $newUrl
            })
            $content = [regex]::Replace($content, '(?<!!)\[(?<label>[^\]]+)\]\((?<url>[^)]+)\)', {
              param($m)
              $newUrl = Resolve-GitHubUrl $m.Groups['url'].Value $false
              return "[{0}]({1})" -f $m.Groups['label'].Value, $newUrl
            })
            $content = [regex]::Replace($content, '(?<attr>src|href)\s*=\s*"(?<url>[^"]+)"', {
              param($m)
              $forImage = $m.Groups['attr'].Value.ToLowerInvariant() -eq 'src'
              $newUrl = Resolve-GitHubUrl $m.Groups['url'].Value $forImage
              return "{0}=""{1}""" -f $m.Groups['attr'].Value, $newUrl
            })
            $content = [regex]::Replace($content, "(?<attr>src|href)\s*=\s*'(?<url>[^']+)'", {
              param($m)
              $forImage = $m.Groups['attr'].Value.ToLowerInvariant() -eq 'src'
              $newUrl = Resolve-GitHubUrl $m.Groups['url'].Value $forImage
              return "{0}='{1}'" -f $m.Groups['attr'].Value, $newUrl
            })

            $content | Set-Content $tmpSrc -Encoding UTF8
            if (Test-Path $tmpPdf) { Remove-Item $tmpPdf -Force }
            npx md-to-pdf $tmpSrc --stylesheet $css --stylesheet $cjkCss --body-class "markdown-body"
            if (-Not (Test-Path $tmpPdf)) { throw "PDF was not generated: $tmpPdf" }
            Move-Item $tmpPdf $dst -Force
            if (-Not (Test-Path $dst)) { throw "PDF was not generated: $dst" }
          }

      - name: Detect Windows SDK
        id: sdk
        shell: pwsh
        run: |
          $sdkRoot = "C:\\Program Files (x86)\\Windows Kits\\10\\Lib"
          $dirs = Get-ChildItem $sdkRoot -Directory | Select-Object -ExpandProperty Name
          if (-Not $dirs) { throw "Windows SDK not found: $sdkRoot" }
          $ver = $dirs | ForEach-Object { [version]$_ } | Sort-Object -Descending | Select-Object -First 1
          $verStr = $ver.ToString()
          Add-Content $env:GITHUB_ENV "WINSDK_VERSION=$verStr"
          Add-Content $env:GITHUB_OUTPUT "version=$verStr"

      - name: Resolve OBS ref
        id: obs
        shell: pwsh
        run: |
          # タグ（注釈付き含む）・ブランチのいずれでも解決できるようにする。
          # 注釈付きタグは ^{} で参照先 commit を優先採用する。
          $ref = $env:OBS_STUDIO_REF
          $lines = git ls-remote https://github.com/obsproject/obs-studio.git "refs/tags/$ref^{}" "refs/tags/$ref" "refs/heads/$ref"
          $deref = $lines | Where-Object { $_ -match '\^\{\}$' } | Select-Object -First 1
          $line  = if ($deref) { $deref } else { $lines | Select-Object -First 1 }
          $sha   = ($line -split '\s+')[0]
          if (-Not $sha) { throw "Failed to resolve OBS ref: $ref" }
          Add-Content $env:GITHUB_ENV "OBS_STUDIO_SHA=$sha"
          Add-Content $env:GITHUB_OUTPUT "sha=$sha"
          Write-Host "OBS ref $ref => $sha"

      - name: Prepare third_party
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force third_party | Out-Null

      - name: Clone OBS Studio
        shell: pwsh
        run: |
          if (-Not (Test-Path "third_party/obs-studio")) {
            git clone --filter=blob:none https://github.com/obsproject/obs-studio.git third_party/obs-studio
          }
          Set-Location third_party/obs-studio
          git fetch --tags origin
          git checkout --force $env:OBS_STUDIO_SHA
          git submodule update --init --recursive --depth 1

      - name: Restore OBS build cache
        id: obs-cache
        uses: actions/cache/restore@v6
        with:
          path: |
            third_party/obs-studio/build_x64
            third_party/obs-studio/.deps
          key: ${{ runner.os }}-obs-build-ref-${{ env.OBS_STUDIO_REF }}-sha-${{ steps.obs.outputs.sha }}-sdk-${{ steps.sdk.outputs.version }}
          # 同一 ref かつ同一 SHA の範囲のみフォールバックを許可する。
          # 旧来の広いフォールバックは異なる OBS/obs-deps 世代を跨いで拾うため撤去した。
          restore-keys: |
            ${{ runner.os }}-obs-build-ref-${{ env.OBS_STUDIO_REF }}-sha-${{ steps.obs.outputs.sha }}-sdk-
            ${{ runner.os }}-obs-build-ref-${{ env.OBS_STUDIO_REF }}-sha-${{ steps.obs.outputs.sha }}-

      - name: Patch OBS preset (SDK / generator)
        shell: pwsh
        run: |
          Set-Location third_party/obs-studio
          $presetPath = "CMakePresets.json"
          if (-Not (Test-Path $presetPath)) { throw "CMakePresets.json not found." }
          $raw = Get-Content $presetPath -Raw
          $patched = $raw.Replace("10.0.22621.0", $env:WINSDK_VERSION)
          if ($raw -eq $patched) { Write-Host "No preset SDK version to replace." }
          # OBS の preset はジェネレーターを "Visual Studio 17 2022" に固定しているが、
          # windows-latest ランナーは VS 2026 のみのため、プラグイン側と同じ VS 2026 へ揃える。
          $genBefore = $patched
          $patched = $patched.Replace("Visual Studio 17 2022", "Visual Studio 18 2026")
          if ($genBefore -eq $patched) { Write-Host "No preset generator to replace." }
          $patched | Set-Content $presetPath -Encoding UTF8

      - name: Check OBS build outputs
        id: obs-build-check
        shell: pwsh
        run: |
          $libobs = "third_party/obs-studio/build_x64/libobs/RelWithDebInfo/obs.lib"
          $exactCacheHit = '${{ steps.obs-cache.outputs.cache-hit }}' -eq 'true'
          if ($exactCacheHit -and (Test-Path $libobs)) {
            Write-Host "OBS build cache exact hit: $libobs"
            Add-Content $env:GITHUB_OUTPUT "skip=true"
          } else {
            if (Test-Path $libobs) {
              Write-Host "OBS cache restored by fallback key. Running incremental OBS build."
            } else {
              Write-Host "OBS build cache miss: $libobs"
            }
            Add-Content $env:GITHUB_OUTPUT "skip=false"
          }

      - name: Build OBS Studio
        if: steps.obs-build-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          Set-Location third_party/obs-studio
          cmake --list-presets
          cmake --preset windows-x64
          cmake --build --preset windows-x64 --config RelWithDebInfo --parallel

      - name: Save OBS build cache
        if: success() && steps.obs-build-check.outputs.skip != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            third_party/obs-studio/build_x64
            third_party/obs-studio/.deps
          key: ${{ runner.os }}-obs-build-ref-${{ env.OBS_STUDIO_REF }}-sha-${{ steps.obs.outputs.sha }}-sdk-${{ steps.sdk.outputs.version }}

      - name: Configure plugin (ProgramData layout)
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 18 2026" -A x64 -DOBS_SOURCE_DIR="$env:GITHUB_WORKSPACE/third_party/obs-studio" -DOBS_PLUGIN_LEGACY_INSTALL=OFF

      - name: Build plugin
        shell: pwsh
        run: |
          cmake --build build --config RelWithDebInfo --parallel

      - name: Guard against FFmpeg imports
        shell: pwsh
        run: |
          # 案 C の核心: プラグインは FFmpeg(libav*/libsw*) を import してはならない。
          # import すると OBS 同梱 FFmpeg の世代差でロード不可になるため、ここで必ず検知する。
          $dll = "$env:GITHUB_WORKSPACE/build/RelWithDebInfo/aunsync.dll"
          if (-Not (Test-Path $dll)) { throw "DLL not found: $dll" }
          $bytes = [System.IO.File]::ReadAllBytes($dll)
          $text  = [System.Text.Encoding]::ASCII.GetString($bytes)
          $bad   = @('avcodec-','avutil-','swresample-','swscale-','avformat-') |
                   Where-Object { $text.Contains($_) }
          if ($bad) { throw "FFmpeg import detected in plugin DLL: $($bad -join ', ')" }
          Write-Host "OK: no FFmpeg(libav*/libsw*) import in plugin DLL"

      - name: Install to dist (ProgramData layout)
        shell: pwsh
        run: |
          $dist = "$env:GITHUB_WORKSPACE/dist"
          New-Item -ItemType Directory -Force $dist | Out-Null
          $prefix = "$dist/For ProgramData"
          cmake --install build --config RelWithDebInfo --prefix $prefix

      - name: Configure legacy layout
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 18 2026" -A x64 -DOBS_SOURCE_DIR="$env:GITHUB_WORKSPACE/third_party/obs-studio" -DOBS_PLUGIN_LEGACY_INSTALL=ON

      - name: Install to dist (Program Files legacy layout)
        shell: pwsh
        run: |
          $dist = "$env:GITHUB_WORKSPACE/dist"
          New-Item -ItemType Directory -Force $dist | Out-Null
          $prefix = "$dist/For Program Files (legacy)"
          cmake --install build --config RelWithDebInfo --prefix $prefix

      - name: Pack artifact
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "AunSync-$tag.zip"
          $dist = "$env:GITHUB_WORKSPACE/dist"
          $extraFiles = @("LICENSE", "THIRD_PARTY_NOTICES", "CHANGELOG.md")
          New-Item -ItemType Directory -Force $dist | Out-Null

          foreach ($file in $extraFiles) {
            $src = Join-Path $env:GITHUB_WORKSPACE $file
            if (-Not (Test-Path $src -PathType Leaf)) { throw "Required file not found: $src" }
            Copy-Item $src (Join-Path $dist $file) -Force
          }

          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path "dist\\*" -DestinationPath $zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: AunSync
          path: AunSync-${{ github.ref_name }}.zip

      - name: Extract changelog section
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # プレリリースタグ (例: v8.0.0-rc.1) は CHANGELOG セクションを持たないのでスキップ
          if ($tag -match '^\w+\.\d+\.\d+-') {
            Write-Host "Pre-release tag detected ($tag) — skipping changelog extraction"
            Add-Content $env:GITHUB_OUTPUT "path="
            return
          }
          $src = "$env:GITHUB_WORKSPACE/CHANGELOG.md"
          $dst = "$env:GITHUB_WORKSPACE/RELEASE_NOTES.md"
          if (-Not (Test-Path $src -PathType Leaf)) { throw "CHANGELOG.md not found: $src" }
          $content = Get-Content $src -Raw
          $escapedTag = [regex]::Escape($tag)
          $pattern = "(?ms)^##\s+$escapedTag\s+—.*?(?=^##\s+|\z)"
          $match = [regex]::Match($content, $pattern)
          if (-Not $match.Success) { throw "Changelog section not found for tag: $tag" }
          $match.Value.Trim() | Set-Content $dst -Encoding UTF8
          Add-Content $env:GITHUB_OUTPUT "path=$dst"

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: ${{ steps.changelog.outputs.path || '' }}
          files: AunSync-${{ github.ref_name }}.zip
